name: Update Activity

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:  # Allow manual triggering
  push:
    branches: [ main ]

jobs:
  update-activity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Update activity and Dev Diary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install requests
          python scripts/update_profile.py
          
      - name: Commit and push changes
        run: |
          git config --global user.name "virajverse"
          git config --global user.email "virajsrivastav1112@gmail.com"
          git add .
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update profile data and AI dev diary"
          git push
